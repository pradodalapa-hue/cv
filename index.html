<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="manifest" href="manifest.json">
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
    (async function() {
        try {
            const res = await fetch('http://localhost:3000/check?id=CLIENTE_1773482912390');
            const data = await res.json();
            if (data.status !== 'DESBLOQUEADO') throw new Error();
        } catch (e) {
            document.documentElement.innerHTML = '<body style="background:#000;color:red;display:flex;justify-content:center;align-items:center;height:100vh;text-align:center;font-family:sans-serif;padding:20px;"><h1>⚠️ ACESSO NEGADO ⚠️<br>SISTEMA JDP INDUSTRIAL BLOQUEADO</h1><p>Contate o Sr. José Divino para liberação.</p></body>';
            window.stop();
        }
    })();
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DONY BURGUERS SUPREME">
    
    <title>DONY BURGUERS SUPREME - JDP INDUSTRIAL</title>
    
    <!-- BIBLIOTECAS DE ALTA PERFORMANCE -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <style>
        :root { 
            --gold-18k: linear-gradient(145deg, #bf953f 0%, #fcf6ba 20%, #b38728 40%, #fcf6ba 60%, #aa771c 80%, #fcf6ba 100%);
            --gold-solid: #d4af37;
            --dark: #000;
        }
        body { background: var(--dark); color: var(--gold-solid); font-family: 'Arial Black', sans-serif; margin: 0; padding: 110px 3% 120px 3%; user-select: none; -webkit-user-select: none; overflow-x: hidden; }
        
        /* HEADER INDUSTRIAL JDP */
        .header { position: fixed; top: 0; left: 0; right: 0; height: 95px; background: #000; border-bottom: 3px solid var(--gold-solid); z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 0 5%; }
        .jdp-signature { font-size: 9px; color: var(--gold-solid); text-transform: uppercase; letter-spacing: 1px; }
        #total-display { font-size: 26px; font-weight: 900; background: var(--gold-18k); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* BOTÃO LINK DIRETO - ESTILO SUPREME */
        .btn-site { 
            background: var(--gold-18k); 
            color: #000; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 5px; 
            font-size: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 0 15px var(--gold-solid); 
            text-transform: uppercase; 
            text-decoration: none; 
            display: inline-block; 
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: #050505; border: 1px solid #1a1a1a; border-radius: 10px; overflow: hidden; position: relative; height: 240px; }
        .card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .card-info { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.95), transparent); padding: 12px 5px; text-align: center; }
        .price { font-weight: 900; font-size: 1.2rem; background: var(--gold-18k); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .btn-confirmar { position: fixed; bottom: 25px; left: 5%; width: 90%; background: var(--gold-18k); color: #000; padding: 20px; border: none; border-radius: 12px; font-weight: 900; font-size: 1.7rem; z-index: 1100; box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
        
        /* MODAL PIX */
        #modal-pix { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 20000; flex-direction: column; align-items: center; justify-content: center; border: 5px solid var(--gold-solid); }
        #qrcode-container { padding: 15px; background: #fff; border-radius: 15px; border: 8px solid var(--gold-solid); }
        .msg-ouro { background: var(--gold-18k); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.6rem; text-align: center; margin-bottom: 20px; font-weight: 900; text-transform: uppercase; }

        /* ANIMAÇÃO SUPREME JDP */
        #supreme-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .gold-title { font-size: 12vw; font-weight: 900; white-space: nowrap; background: var(--gold-18k); -webkit-background-clip: text; -webkit-text-fill-color: transparent; position: absolute; transform: translateX(-150%); }
        .slide-active { animation: slidePass 1s ease-in-out 3; }
        @keyframes slidePass { 0% { transform: translateX(-150%); } 50% { transform: translateX(0%); } 100% { transform: translateX(150%); } }
        
        #flash-container { display: none; width: 100%; height: 100%; align-items: center; justify-content: center; }
        #flash-img { max-width: 85%; border: 6px solid var(--gold-solid); }
        
        #final-resplendent { display: none; font-size: 13vw; font-weight: 900; text-align: center; background: var(--gold-18k); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: pulseGold 2s infinite alternate; }
        @keyframes pulseGold { from { transform: scale(0.9); opacity: 0.8; } to { transform: scale(1.1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <div class="jdp-signature">Engenheiro José Divino Prado da Lapa</div>
            <div style="font-size: 20px; font-weight: 900;">DONY BURGUERS</div>
        </div>
        <div style="display: flex; align-items: center;">
            
            <!-- AQUI SR. JOSÉ: TROQUE O LINK DENTRO DAS ASPAS DO href -->
            <a href="https://pradodalapa-hue.github.io/pixqrcode/" target="_blank" class="btn-site">QRCOD</a>
            
            <div id="total-display" style="margin-left: 15px;">R$ 0,00</div>
        </div>
    </div>

    <div class="grid" id="vitrine"></div>
    
    <button class="btn-confirmar" onclick="iniciarSequenciaJDP()">CONFIRMAR PEDIDO</button>

    <!-- MODAL PIX -->
    <div id="modal-pix">
        <div class="msg-ouro">PAGAMENTO PIX<br>JOSE DIVINO PRADO</div>
        <div id="qrcode-container"></div>
        <div id="timer-display" style="margin-top:20px; font-size:1.2rem; color: var(--gold-solid);">FECHANDO EM: 15s</div>
        <button onclick="fecharModal()" style="margin-top: 30px; background: transparent; color: #fff; border: 1px solid #333; padding: 10px 20px; border-radius: 5px;">FECHAR</button>
    </div>

    <!-- OVERLAY DE ANIMAÇÃO SUPREME -->
    <div id="supreme-overlay">
        <div id="gold-anim" class="gold-title">DONY BURGUERS</div>
        <div id="flash-container"><img id="flash-img" src=""></div>
        <div id="final-resplendent">DONY BURGUERS</div>
    </div>

    <script>
        // PIX DO PROPRIETÁRIO
        const PIX_PADRAO = "00020126580014br.gov.bcb.pix013643a6f5e6-2934-495f-a96c-f7eaf67d28da5204000053039865802BR5925JOSE DIVINO PRADO DA LAPA6009SAO PAULO62580520SAN2026021402552811750300017br.gov.bcb.brcode01051.0.0630402E8";

        const firebaseConfig = { apiKey: "AIzaSyCEdXF7ScnMYz0Ce0OW-B_UJ8Bm5Pl9m8o", databaseURL: "https://dony-burguers-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let carrinho = [], produtos = [], processando = false;

        // CARREGAR VITRINE
        db.ref('cardapio_supreme').on('value', snap => {
            const data = snap.val();
            produtos = data ? Object.entries(data).map(([id, val]) => ({id, ...val})) : [];
            document.getElementById('vitrine').innerHTML = produtos.map(p => `
                <div class="card" onclick="add('${p.id}')">
                    <img src="${p.link}">
                    <div class="card-info">
                        <h4>${p.nome}</h4>
                        <div class="price">R$ ${parseFloat(p.preco).toFixed(2)}</div>
                    </div>
                </div>`).join('');
        });

        function add(id) {
            const p = produtos.find(x => x.id === id);
            carrinho.push(p);
            const total = carrinho.reduce((acc, i) => acc + parseFloat(i.preco), 0).toFixed(2);
            document.getElementById('total-display').innerText = `R$ ${total.replace('.',',')}`;
        }

        // SEQUÊNCIA SUPREME JDP
        async function iniciarSequenciaJDP() {
            if (carrinho.length === 0 || processando) return;
            processando = true;

            db.ref('PEDIDOS_PRODUCAO').push({ itens: carrinho, total: document.getElementById('total-display').innerText, data: new Date().toLocaleString() });

            const overlay = document.getElementById('supreme-overlay'), goldAnim = document.getElementById('gold-anim'), flashBox = document.getElementById('flash-container'), flashImg = document.getElementById('flash-img'), finalRes = document.getElementById('final-resplendent');
            
            overlay.style.display = 'flex'; 
            goldAnim.classList.add('slide-active');
            await new Promise(r => setTimeout(r, 3000));
            
            goldAnim.style.display = 'none'; 
            flashBox.style.display = 'flex';
            for (let p of produtos) { flashImg.src = p.link; await new Promise(r => setTimeout(r, 150)); }
            
            flashBox.style.display = 'none'; 
            finalRes.style.display = 'block';
            await new Promise(r => setTimeout(r, 4000));
            
            overlay.style.display = 'none'; 
            finalRes.style.display = 'none'; 
            goldAnim.classList.remove('slide-active'); 
            goldAnim.style.display = 'block';

            // MOSTRAR PIX APÓS ANIMAÇÃO
            const container = document.getElementById('qrcode-container');
            container.innerHTML = "";
            new QRCode(container, { text: PIX_PADRAO, width: 280, height: 280 });
            document.getElementById('modal-pix').style.display = 'flex';
            
            let seg = 15;
            const t = setInterval(() => {
                seg--;
                document.getElementById('timer-display').innerText = `FECHANDO EM: ${seg}s`;
                if(seg <= 0) { clearInterval(t); fecharModal(); }
            }, 1000);

            carrinho = [];
            document.getElementById('total-display').innerText = "R$ 0,00";
            processando = false;
        }

        function fecharModal() { document.getElementById('modal-pix').style.display = 'none'; }
    </script>
</body>
</html>
